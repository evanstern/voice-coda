services:
  server:
    image: ghcr.io/evanstern/voice-coda/server:${IMAGE_TAG:-latest}
    expose:
      - "4000"
    env_file:
      - .env
    environment:
      PORT: "4000"
      NODE_ENV: production
      WORK_DIR: /workspace
      PIPER_URL: http://piper:5000
      BEHIND_PROXY: "${BEHIND_PROXY:-true}"
    volumes:
      - ${WORK_DIR:-./workspace}:/workspace
      - ${CONVERSATIONS_DIR:-./data/conversations}:/app/data/conversations
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.voice-coda-ws.rule=Host(`${VOICE_CODA_HOST:-voice.local.infinity-node.win}`) && PathPrefix(`/ws`)
      - traefik.http.routers.voice-coda-ws.entrypoints=web
      - traefik.http.routers.voice-coda-ws.service=voice-coda-server
      - traefik.http.routers.voice-coda-api.rule=Host(`${VOICE_CODA_HOST:-voice.local.infinity-node.win}`) && PathPrefix(`/trpc`)
      - traefik.http.routers.voice-coda-api.entrypoints=web
      - traefik.http.routers.voice-coda-api.service=voice-coda-server
      - traefik.http.routers.voice-coda-health.rule=Host(`${VOICE_CODA_HOST:-voice.local.infinity-node.win}`) && Path(`/api/health`)
      - traefik.http.routers.voice-coda-health.entrypoints=web
      - traefik.http.routers.voice-coda-health.service=voice-coda-server
      - traefik.http.services.voice-coda-server.loadbalancer.server.port=4000
    networks:
      - voice-coda
      - traefik-network

  web:
    image: ghcr.io/evanstern/voice-coda/web:${IMAGE_TAG:-latest}
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      NODE_ENV: production
      SERVER_URL: http://server:4000
    depends_on:
      - server
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.voice-coda-web.rule=Host(`${VOICE_CODA_HOST:-voice.local.infinity-node.win}`)
      - traefik.http.routers.voice-coda-web.entrypoints=web
      - traefik.http.routers.voice-coda-web.service=voice-coda-web
      - traefik.http.routers.voice-coda-web.priority=1
      - traefik.http.services.voice-coda-web.loadbalancer.server.port=3000
    networks:
      - voice-coda
      - traefik-network

  piper:
    image: ghcr.io/evanstern/voice-coda/piper:${IMAGE_TAG:-latest}
    profiles:
      - piper
    env_file:
      - .env
    environment:
      PIPER_MODEL: /models/${PIPER_MODEL_NAME:-en_US-lessac-medium.onnx}
    volumes:
      - ${PIPER_MODELS_DIR:-./models/piper}:/models
    depends_on:
      piper-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3
    networks:
      - voice-coda

  piper-init:
    image: alpine:3.20
    profiles:
      - piper
    volumes:
      - ${PIPER_MODELS_DIR:-./models/piper}:/models
    entrypoint: /bin/sh
    command:
      - -c
      - |
        MODEL_NAME="${PIPER_MODEL_NAME:-en_US-lessac-medium.onnx}"
        MODEL_PATH="/models/$${MODEL_NAME}"
        if [ -f "$${MODEL_PATH}" ]; then
          echo "[piper-init] Model already exists: $${MODEL_NAME}"
          exit 0
        fi
        echo "[piper-init] Downloading model: $${MODEL_NAME}..."
        apk add --no-cache wget
        wget -q -O "$${MODEL_PATH}" \
          "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/$${MODEL_NAME}"
        wget -q -O "$${MODEL_PATH}.json" \
          "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/$${MODEL_NAME}.json"
        echo "[piper-init] Download complete."
    environment:
      PIPER_MODEL_NAME: ${PIPER_MODEL_NAME:-en_US-lessac-medium.onnx}

networks:
  voice-coda:
    driver: bridge
  traefik-network:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-network}
